name: Release

# Builds the Windows exe and attaches it to a GitHub Release. Fires on any
# `vX.Y.Z`-style tag push; `workflow_dispatch` is a manual fallback for
# re-cutting a release without pushing a new tag (e.g. after fixing a busted
# build) - it requires the tag to already exist.
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Existing tag to release (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag_name || github.ref }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      # `--locked` fails the build if Cargo.lock is out of date rather than
      # silently re-resolving - a release build should always match exactly
      # what's committed.
      - name: Build release binary
        run: cargo build --release --locked

      - name: Stage artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item target/release/monitor-switcher.exe dist/monitor-switcher.exe
          Compress-Archive -Path dist/monitor-switcher.exe -DestinationPath dist/monitor-switcher-windows-x64.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag_name || github.ref_name }}
          generate_release_notes: true
          files: |
            dist/monitor-switcher.exe
            dist/monitor-switcher-windows-x64.zip
